<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Critterforge — Build. Train. Unleash.</title>
<meta name="description" content="Build a creature from parts, then watch it fight, race and shove entirely on its own. Battle friends online with a room code. Six planets, permadeath league, live betting, limbs optional.">
<meta name="theme-color" content="#0b1020">
<meta property="og:title" content="Critterforge — Build. Train. Unleash.">
<meta property="og:description" content="Design a battle critter, then challenge me online — I'll send you a room code. 🧬⚔️">
<meta property="og:type" content="website">
<meta property="og:url" content="https://guppyo.github.io/critterforge/">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='32' cy='34' rx='22' ry='18' fill='%234ade80'/%3E%3Cellipse cx='32' cy='34' rx='22' ry='18' fill='none' stroke='%23166534' stroke-width='3'/%3E%3Ccircle cx='40' cy='28' r='6' fill='white'/%3E%3Ccircle cx='42' cy='28' r='3' fill='%2314202e'/%3E%3Ccircle cx='24' cy='28' r='6' fill='white'/%3E%3Ccircle cx='26' cy='28' r='3' fill='%2314202e'/%3E%3Cpath d='M14 44 L6 52 M22 48 L18 58 M42 48 L46 58 M50 44 L58 52' stroke='%23166534' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <!-- persistent top bar -->
  <header id="topbar" class="hidden">
    <div class="tb-left">
      <button class="tb-logo" id="btn-home" title="Main menu">🧬 <span>CRITTERFORGE</span></button>
    </div>
    <div class="tb-right">
      <div class="tb-chip" id="tb-league" title="Your league"></div>
      <div class="tb-chip dna" title="DNA — earn it in matches, spend it in the Gene Shop">🧪 <span id="tb-dna">0</span></div>
    </div>
  </header>

  <!-- screens are swapped by main.js -->
  <main id="screen"></main>

  <!-- simulation canvas layer -->
  <div id="simwrap" class="hidden">
    <canvas id="simcanvas"></canvas>
    <div id="simhud">
      <div id="sim-topline"></div>
      <div id="sim-controls">
        <button data-speed="1" class="spd on">1×</button>
        <button data-speed="2" class="spd">2×</button>
        <button data-speed="4" class="spd">4×</button>
        <button id="btn-skip">Skip ⏭</button>
      </div>
    </div>
  </div>

  <!-- modal layer -->
  <div id="modal-layer" class="hidden"><div id="modal-box"></div></div>

  <!-- toast layer -->
  <div id="toasts"></div>
</div>
<script src="vendor/peerjs.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
